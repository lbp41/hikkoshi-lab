<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>引っ越し費用チェック｜30秒で料金の目安がわかる</title>

<meta name="description" content="引っ越し費用を30秒でチェック。条件別に最安の目安がわかります。知らないと損するポイントも解説。">
<meta name="keywords" content="引っ越し,費用,見積もり,料金,比較">

<meta property="og:title" content="引っ越し費用チェック">
<meta property="og:description" content="30秒で料金の目安がわかる">
<meta property="og:type" content="website">
<meta property="og:url" content="https://lbp41.github.io/hikkoshi-lab/">

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f0f2f5;
  margin: 0;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 14px;
  padding: 24px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

h1 {
  font-size: 20px;
  margin-bottom: 4px;
}

.sub {
  font-size: 14px;
  color: #666;
  margin-bottom: 12px;
}

.guide {
  font-size: 14px;
  margin-bottom: 12px;
}

.guide a {
  color: #ff6b6b;
  text-decoration: none;
}

.progress-text {
  font-size: 12px;
  color: #999;
  margin-bottom: 6px;
}

.progress {
  height: 6px;
  background: #eee;
  border-radius: 4px;
  margin-bottom: 20px;
}

.progress-bar {
  height: 100%;
  width: 33%;
  background: #ff6b6b;
  transition: 0.3s;
}

h2 {
  font-size: 18px;
  margin-bottom: 14px;
}

button {
  width: 100%;
  padding: 16px;
  margin: 8px 0;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  background: #ff6b6b;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  opacity: 0.95;
}

.hidden {
  display: none;
}

.result strong {
  color: #ff3b3b;
  font-size: 18px;
}

.cta {
  margin-top: 20px;
}

.cta button {
  background: #ff3b3b;
  font-size: 18px;
  padding: 18px;
}

.footer {
  margin-top: 20px;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>引っ越し費用チェック</h1>
<p class="sub">30秒であなたの費用目安がわかります</p>

<div class="guide">
  <a href="guide.html">診断前にチェック｜引っ越しで3万円損しないポイント</a>
</div>

<p id="stepText" class="progress-text">ステップ 1 / 3</p>

<div class="progress">
  <div id="progress" class="progress-bar"></div>
</div>

<!-- Q1 -->
<div id="q1">
  <h2>引っ越しタイプを選択してください</h2>
  <button onclick="next()">単身</button>
  <button onclick="next()">家族</button>
</div>

<!-- Q2 -->
<div id="q2" class="hidden">
  <h2>荷物の量を教えてください</h2>
  <button onclick="next()">少ない</button>
  <button onclick="next()">普通</button>
  <button onclick="next()">多い</button>
</div>

<!-- Q3 -->
<div id="q3" class="hidden">
  <h2>移動距離はどのくらいですか？</h2>
  <button onclick="showResult()">同じ市内</button>
  <button onclick="showResult()">県内</button>
  <button onclick="showResult()">長距離</button>
</div>

<!-- RESULT -->
<div id="result" class="hidden result">

  <p style="font-size:14px;">
    <a href="guide.html">→ 引っ越しの注意点を確認する</a>
  </p>

  <h2>あなたの引っ越し費用の目安</h2>

  <p>
    条件から見ると<br>
    <strong>2〜5万円以上の差が出る可能性があります</strong>
  </p>

  <p>
    同じ条件でも業者ごとに料金が大きく変わります
  </p>

  <div class="cta">
    <a href="ここにアフィリンク" target="_blank">
      <button>無料で一括見積もりを確認する</button>
    </a>
  </div>

</div>

<div class="footer">
  <p><a href="privacy.html">プライバシーポリシー</a></p>
  <p><a href="about.html">運営者情報</a></p>
</div>

</div>
</div>

<script>
let step = 1;

function next() {
  document.getElementById("q" + step).classList.add("hidden");
  step++;
  document.getElementById("q" + step).classList.remove("hidden");

  updateUI();
}

function showResult() {
  document.getElementById("q3").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  document.getElementById("progress").style.width = "100%";
  document.getElementById("stepText").innerText = "完了";
}

function updateUI() {
  const progress = document.getElementById("progress");
  const stepText = document.getElementById("stepText");

  if (step === 2) {
    progress.style.width = "66%";
    stepText.innerText = "ステップ 2 / 3";
  }

  if (step === 3) {
    progress.style.width = "100%";
    stepText.innerText = "ステップ 3 / 3";
  }
}
</script>

</body>
</html>
